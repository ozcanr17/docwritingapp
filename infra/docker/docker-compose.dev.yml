name: docsys-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: docsys
      POSTGRES_PASSWORD: docsys
      POSTGRES_DB: docsys
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docsys -d docsys"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - docsys-net

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - docsys-net

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - docsys-net

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  docsys-net:
    driver: bridge
