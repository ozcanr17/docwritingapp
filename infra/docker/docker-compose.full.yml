name: docsys

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-docsys}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docsys}
      POSTGRES_DB: ${POSTGRES_DB:-docsys}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docsys}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - docsys-net

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - docsys-net

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - docsys-net

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-docsys}:${POSTGRES_PASSWORD:-docsys}@postgres:5432/${POSTGRES_DB:-docsys}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    networks:
      - docsys-net

  collaboration:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.collaboration
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-docsys}:${POSTGRES_PASSWORD:-docsys}@postgres:5432/${POSTGRES_DB:-docsys}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      COLLAB_PORT: "3002"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3002:3002"
    networks:
      - docsys-net

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-docsys}:${POSTGRES_PASSWORD:-docsys}@postgres:5432/${POSTGRES_DB:-docsys}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TRASH_RETENTION_DAYS: ${TRASH_RETENTION_DAYS:-30}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - docsys-net

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  docsys-net:
    driver: bridge
