name: docsys

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-docsys}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-docsys}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docsys}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - docsys-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - docsys-net

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?set S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?set S3_SECRET_KEY}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - docsys-net

  migrate:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    command: ["pnpm", "--filter", "@docsys/database", "exec", "prisma", "migrate", "deploy"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-docsys}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-docsys}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - docsys-net
    restart: "no"

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-docsys}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-docsys}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:3001}
      COLLAB_PUBLIC_URL: ${COLLAB_PUBLIC_URL:-ws://localhost:3002}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      COOKIE_SECURE: ${COOKIE_SECURE:?set COOKIE_SECURE to true}
      METRICS_TOKEN: ${METRICS_TOKEN:?set METRICS_TOKEN}
      ALLOW_PUBLIC_REGISTRATION: ${ALLOW_PUBLIC_REGISTRATION:-false}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-docsys}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?set S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?set S3_SECRET_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3001/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - docsys-net

  collaboration:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.collaboration
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-docsys}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-docsys}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      COLLAB_PORT: "3002"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3002/"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - docsys-net

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-docsys}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-docsys}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-docsys}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?set S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?set S3_SECRET_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TRASH_RETENTION_DAYS: ${TRASH_RETENTION_DAYS:-30}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "3003:3003"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3003/health/live"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - docsys-net

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
        VITE_COLLAB_URL: ${VITE_COLLAB_URL:-ws://localhost:3002}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      collaboration:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"
    networks:
      - docsys-net

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  docsys-net:
    driver: bridge
