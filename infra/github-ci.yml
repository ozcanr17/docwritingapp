name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: docsys
          POSTGRES_PASSWORD: docsys
          POSTGRES_DB: docsys_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U docsys"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://docsys:docsys@localhost:5432/docsys_test
      TEST_DATABASE_URL: postgresql://docsys:docsys@localhost:5432/docsys_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-secret-at-least-16-chars
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @docsys/database validate
      - run: pnpm --filter @docsys/database generate
      - run: pnpm --filter @docsys/database build
      - run: pnpm --filter @docsys/config build
      - run: pnpm -r --filter "./apps/*" typecheck
      - run: bash infra/scripts/scan-forbidden-chars.sh
      - run: pnpm --filter @docsys/api test
      - run: pnpm --filter @docsys/worker test
