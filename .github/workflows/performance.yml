name: performance-budgets

on:
  workflow_dispatch:
  schedule:
    - cron: "20 2 * * 1"

permissions:
  contents: read

jobs:
  large-document:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: docsys
          POSTGRES_PASSWORD: docsys
          POSTGRES_DB: docsys_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U docsys"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://docsys:docsys@localhost:5432/docsys_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: performance-secret-at-least-16-chars
      PERF_RESULT_PATH: large-document-results.json
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @docsys/database migrate:deploy
      - run: pnpm --filter @docsys/database generate && pnpm --filter @docsys/database build && pnpm --filter @docsys/api build
      - run: node apps/api/dist/main.js > api-performance.log 2>&1 &
      - run: for _ in {1..30}; do curl -fsS http://127.0.0.1:3001/health/ready && exit 0; sleep 1; done; exit 1
      - run: pnpm --filter @docsys/performance-tests large-document
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-results
          path: |
            tests/performance/large-document-results.json
            api-performance.log
